<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,system-ui,sans-serif;
    background:
      radial-gradient(820px 560px at 88% -12%, rgba(216,27,131,.16), transparent 60%),
      radial-gradient(720px 520px at -8% 112%, rgba(50,173,230,.16), transparent 60%),
      linear-gradient(180deg,#ffffff,#f6f5f8);
    color:#1c1b22; position:relative;
    padding:88px 96px; display:flex; flex-direction:column; justify-content:space-between;
  }
  .top{display:flex;align-items:center;gap:22px}
  .top img{width:96px;height:96px;border-radius:22px;box-shadow:0 18px 44px -16px rgba(20,18,40,.45)}
  .top .name{font-size:40px;font-weight:800;letter-spacing:-1px}
  .pill{margin-left:14px;font-size:20px;font-weight:700;color:#1d7a45;
    background:rgba(52,199,89,.12);border:1px solid rgba(52,199,89,.3);padding:8px 18px;border-radius:999px}
  h1{font-size:82px;line-height:1.02;font-weight:820;letter-spacing:-3px;max-width:14ch}
  h1 .g{background:linear-gradient(90deg,#7B2FF7,#E0218A,#FF3B30,#FF9500,#34C759,#007AFF);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{font-size:30px;color:#46454f;line-height:1.4;max-width:30ch;margin-top:26px}
  .foot{display:flex;align-items:center;gap:26px;font-size:23px;color:#6b6a76;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:#cfcdd6}
</style></head>
<body>
  <div class="top">
    <img src="icon-512.png" alt=""/>
    <div class="name">Murmur</div>
    <div class="pill">● 100% on-device</div>
  </div>
  <div>
    <h1>Mac dictation that respects your <span class="g">privacy</span> and your <span class="g">hands</span>.</h1>
    <p class="lead">Hold a key, speak, and your words appear in any app. Transcription and AI cleanup run on this Mac. Nothing is uploaded.</p>
  </div>
  <div class="foot">
    <span>macOS 14+</span><span class="dot"></span>
    <span>Apple Silicon or Intel</span><span class="dot"></span>
    <span>No account, no cloud</span>
  </div>
</body></html>
